services:
  backend:
    image: python:3.11-slim
    container_name: anisync-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install -r requirements.txt &&
               uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

  frontend:
    image: node:20-alpine
    container_name: anisync-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
