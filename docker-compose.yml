services:
  backend:
    build: ./backend
    container_name: anisync-backend
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: anisync-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
